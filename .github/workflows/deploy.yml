name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
      BING_SITE_URL: https://freehub.co.za
      INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
      INDEXNOW_SITE_URL: https://freehub.co.za

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate static pages
        run: node scripts/generate-pages.js

      - name: Create optional Firebase config
        env:
          FREEHUB_FIREBASE_API_KEY: ${{ vars.FREEHUB_FIREBASE_API_KEY }}
          FREEHUB_FIREBASE_AUTH_DOMAIN: ${{ vars.FREEHUB_FIREBASE_AUTH_DOMAIN }}
          FREEHUB_FIREBASE_PROJECT_ID: ${{ vars.FREEHUB_FIREBASE_PROJECT_ID }}
          FREEHUB_FIREBASE_STORAGE_BUCKET: ${{ vars.FREEHUB_FIREBASE_STORAGE_BUCKET }}
          FREEHUB_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FREEHUB_FIREBASE_MESSAGING_SENDER_ID }}
          FREEHUB_FIREBASE_APP_ID: ${{ vars.FREEHUB_FIREBASE_APP_ID }}
          FREEHUB_FIREBASE_MEASUREMENT_ID: ${{ vars.FREEHUB_FIREBASE_MEASUREMENT_ID }}
          FREEHUB_FIREBASE_AUTH_PROVIDERS: ${{ vars.FREEHUB_FIREBASE_AUTH_PROVIDERS }}
        run: |
          if [ -z "$FREEHUB_FIREBASE_API_KEY" ] || [ -z "$FREEHUB_FIREBASE_AUTH_DOMAIN" ] || [ -z "$FREEHUB_FIREBASE_PROJECT_ID" ] || [ -z "$FREEHUB_FIREBASE_APP_ID" ]; then
            echo "Firebase web config variables are not set; deploying without optional auth UI."
            exit 0
          fi

          node <<'NODE'
          const fs = require("fs");

          const providers = (process.env.FREEHUB_FIREBASE_AUTH_PROVIDERS || "google,emailLink")
            .split(",")
            .map((provider) => provider.trim())
            .filter(Boolean);

          const config = {
            apiKey: process.env.FREEHUB_FIREBASE_API_KEY,
            authDomain: process.env.FREEHUB_FIREBASE_AUTH_DOMAIN,
            projectId: process.env.FREEHUB_FIREBASE_PROJECT_ID,
            storageBucket: process.env.FREEHUB_FIREBASE_STORAGE_BUCKET,
            messagingSenderId: process.env.FREEHUB_FIREBASE_MESSAGING_SENDER_ID,
            appId: process.env.FREEHUB_FIREBASE_APP_ID,
            measurementId: process.env.FREEHUB_FIREBASE_MEASUREMENT_ID,
            enabledAuthProviders: providers,
          };

          fs.writeFileSync("firebase-config.json", `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Write IndexNow key file
        if: env.INDEXNOW_API_KEY != ''
        run: node scripts/write-indexnow-key.js

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

      - name: Submit sitemap URLs to Bing Webmaster
        if: env.BING_WEBMASTER_API_KEY != ''
        continue-on-error: true
        run: node scripts/submit-bing.js --sitemap=https://freehub.co.za/sitemap.xml

      - name: Submit sitemap URLs to IndexNow
        if: env.INDEXNOW_API_KEY != ''
        continue-on-error: true
        run: node scripts/submit-indexnow.js --sitemap=https://freehub.co.za/sitemap.xml
